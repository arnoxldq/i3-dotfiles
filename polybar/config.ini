;==========================================================
;  Catppuccin Mocha Polybar Config
;  Maintainer: justTOBBI
;==========================================================

;-------------------------
; Colors
;-------------------------
[colors]
rosewater = #f5e0dc
flamingo = #f2cdcd
pink = #f5c2e7
mauve = #cba6f7
red = #f38ba8
maroon = #eba0ac
peach = #fab387
yellow = #f9e2af
green = #a6e3a1
teal = #94e2d5
sky = #89dceb
sapphire = #74c7ec
blue = #89b4fa
lavender = #b4befe
text = #cdd6f4
subtext1 = #bac2de
subtext0 = #a6adc8
overlay2 = #9399b2
overlay1 = #7f849c
overlay0 = #6c7086
surface2 = #585b70
surface1 = #45475a
surface0 = #313244
base = #1e1e2e
mantle = #181825
crust = #11111b
transparent = #00000000


;-------------------------
; Bar
;-------------------------
[bar/main]
width = 100%
height = 30
radius = 0

background = ${colors.base}
foreground = ${colors.text}

border-size = 0
padding-left = 2
padding-right = 2

module-margin = 1

font-0 = JetBrainsMono Nerd Font:style=Regular:size=10;2

modules-left = xworkspaces
modules-center = date
modules-right = pulseaudio memory cpu wlan battery

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true


;-------------------------
; Workspaces (i3/bspwm)
;-------------------------
[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.surface0}
label-active-foreground = ${colors.mauve}
label-active-padding = 2

label-occupied = %name%
label-occupied-foreground = ${colors.text}
label-occupied-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.base}
label-urgent-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.overlay1}
label-empty-padding = 2


;-------------------------
; CPU
;-------------------------
[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "  "
format-prefix-foreground = ${colors.peach}
label = %percentage%%
label-foreground = ${colors.text}


;-------------------------
; Memory
;-------------------------
[module/memory]
type = internal/memory
interval = 3
format-prefix = "  "
format-prefix-foreground = ${colors.green}
label = %percentage_used%%
label-foreground = ${colors.text}


;-------------------------
; Audio
;-------------------------
[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "  "
format-volume-prefix-foreground = ${colors.sky}
label-volume = %percentage%%
label-volume-foreground = ${colors.text}

label-muted = "  muted"
label-muted-foreground = ${colors.overlay1}


;-------------------------
; Network (WiFi)
;-------------------------
[module/wlan]
type = internal/network
interface = wlan0
interval = 3

format-connected-prefix = "  "
format-connected-prefix-foreground = ${colors.teal}
label-connected = %essid%
label-connected-foreground = ${colors.text}

format-disconnected = "󰖪  offline"
format-disconnected-foreground = ${colors.red}


;-------------------------
; Battery
;-------------------------
[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
poll-interval = 5

format-charging-prefix = "󰂄  "
format-charging-prefix-foreground = ${colors.green}
label-charging = %percentage%%

format-discharging-prefix = "󰁹  "
format-discharging-prefix-foreground = ${colors.yellow}
label-discharging = %percentage%%

label-full = "󰁹  100%"
label-full-foreground = ${colors.green}


;-------------------------
; Date & Time
;-------------------------
[module/date]
type = internal/date
interval = 1

date = %a, %d %b
time = %H:%M

label =   %date%  %time%
label-foreground = ${colors.lavender}
